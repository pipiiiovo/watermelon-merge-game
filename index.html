<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合成小竹君 🎀</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(135deg,#1a0533 0%,#2d1b4e 50%,#1a0533 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  font-family:'Segoe UI',sans-serif;overflow-x:hidden;
}
#app{display:flex;flex-direction:column;align-items:center;padding:8px;width:100%;max-width:420px;}
#topbar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:360px;margin-bottom:6px;gap:6px;}
#title{font-size:17px;font-weight:bold;color:#ff9ff3;text-shadow:0 0 8px rgba(255,159,243,.5);white-space:nowrap;}
#score-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;text-align:center;min-width:72px;}
#score-label{font-size:10px;color:#aaa;}
#score{font-size:20px;font-weight:bold;color:#ffd700;}
#leaderboard-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:5px 10px;cursor:pointer;color:#fff;font-size:12px;white-space:nowrap;}
#preview-bar{display:flex;align-items:center;gap:10px;width:100%;max-width:360px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px 12px;margin-bottom:6px;}
#current-info,.sep,#next-info{flex:1;text-align:center;}
.sep{color:rgba(255,255,255,.3);font-size:18px;}
.preview-lbl{font-size:10px;color:#aaa;margin-bottom:2px;}
.preview-name{font-size:12px;color:#fff;font-weight:600;}
#game-wrapper{position:relative;width:360px;border-radius:14px;overflow:hidden;box-shadow:0 0 30px rgba(255,100,200,.3);}
#gameCanvas{display:block;cursor:crosshair;background:#0d0020;}
#particle-canvas{position:absolute;top:0;left:0;pointer-events:none;}
#drop-svg{position:absolute;top:0;left:0;pointer-events:none;width:100%;height:100%;}
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.88);flex-direction:column;align-items:center;justify-content:center;z-index:100;border-radius:14px;backdrop-filter:blur(8px);padding:20px;}
.overlay.active{display:flex;}
.overlay h2{font-size:28px;color:#ff9ff3;margin-bottom:8px;text-align:center;}
.overlay p{color:#ccc;margin-bottom:5px;font-size:13px;text-align:center;}
.big-score{font-size:44px;font-weight:bold;color:#ffd700;margin:8px 0;}
.btn{margin-top:14px;padding:10px 28px;font-size:16px;border:none;border-radius:50px;cursor:pointer;background:linear-gradient(135deg,#ff6ef7,#9b59b6);color:#fff;font-weight:bold;box-shadow:0 4px 16px rgba(255,100,255,.4);}
input.name-input{margin-top:8px;padding:10px 16px;font-size:16px;border:2px solid rgba(255,159,243,.5);border-radius:50px;background:rgba(255,255,255,.1);color:#fff;text-align:center;outline:none;width:200px;}
input.name-input::placeholder{color:rgba(255,255,255,.4);}
#lb-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;z-index:200;border-radius:14px;backdrop-filter:blur(10px);padding:16px;overflow-y:auto;}
#lb-overlay.active{display:flex;}
#lb-overlay h2{font-size:22px;color:#ffd700;margin-bottom:12px;}
#lb-list{width:100%;max-width:300px;}
.lb-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:8px;margin-bottom:4px;background:rgba(255,255,255,.06);font-size:13px;color:#eee;}
.lb-row.me{background:rgba(255,159,243,.15);color:#ff9ff3;font-weight:bold;}
.lb-rank{width:24px;font-weight:bold;color:#ffd700;}
.lb-name{flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-weight:bold;color:#ffd700;}
#level-guide{width:100%;max-width:360px;margin-top:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;}
#level-guide h3{color:#ff9ff3;font-size:12px;margin-bottom:6px;text-align:center;}
#level-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;}
.level-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.level-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,.9);font-weight:bold;flex-shrink:0;}
.level-name{font-size:6.5px;color:#aaa;text-align:center;line-height:1.2;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="title">🎀 合成小竹君</div>

  </div>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="360" height="520"></canvas>

<script>
// ── LEVELS ──────────────────────────────────────────
const LEVELS = [
  {lv:1,  emoji:'😊', name:'微笑竹君',   r:15,  color:'#FF9AA2'},
  {lv:2,  emoji:'😲', name:'惊讶竹君',   r:19,  color:'#FFB7B2'},

  {lv:12, emoji:'🐷', name:'肥胖竹君',   r:66,  color:'#FFB3DE'},
  {lv:13, emoji:'💃', name:'纤细竹君',   r:70,  color:'#FF99CC'},
  {lv:14, emoji:'💥', name:'爆炸头竹君', r:74,  color:'#FFAA00'},
  {lv:15, emoji:'💭', name:'冒泡竹君',   r:78,  color:'#AAE4FF'},
  {lv:16, emoji:'🤩', name:'星眼竹君',   r:82,  color:'#FFD700'},
  {lv:17, emoji:'👸', name:'公主竹君',   r:86,  color:'#FFB6C1'},
  {lv:18, emoji:'🥷', name:'忍者竹君',   r:89,  color:'#666677'},
  {lv:19, emoji:'🧙', name:'魔女竹君',   r:92,  color:'#C39BD3'},
  {lv:20, emoji:'🚀', name:'宇航竹君',   r:95,  color:'#4FC3F7'},
  {lv:21, emoji:'👨‍🍳',name:'厨师竹君',  r:98,  color:'#FFFFFF'},
  {lv:22, emoji:'🏃', name:'运动竹君',   r:101, color:'#FF6B35'},
  {lv:23, emoji:'🕵️', name:'侦探竹君',  r:104, color:'#C8A96E'},
  {lv:24, emoji:'🦸', name:'超人竹君',   r:107, color:'#5C8AE6'},
  {lv:25, emoji:'🗿', name:'巨人竹君',   r:110, color:'#B0B0B0'},
  {lv:26, emoji:'👻', name:'透明竹君',   r:112, color:'#CCCCFF'},
  {lv:27, emoji:'✨', name:'发光竹君',   r:114, color:'#FFFF99'},
  {lv:28, emoji:'👾', name:'像素竹君',   r:116, color:'#00FF41'},
  {lv:29, emoji:'👴', name:'老奶奶竹君', r:117, color:'#D3D3D3'},
  {lv:30, emoji:'👶', name:'婴儿竹君',   r:118, color:'#FFD6A5'},
  {lv:31, emoji:'💧', name:'融化竹君',   r:119, color:'#89CFF0'},
  {lv:32, emoji:'👑', name:'宇宙女神',   r:120, color:'#FFD700'},
];
const SPAWN_MAX_IDX = 4; // only lv 0–4 (Lv1–5) can spawn from top

// ── LEADERBOARD ─────────────────────────────────────
function loadLB(){ try{return JSON.parse(localStorage.getItem('wm_lb')||'[]');}catch(e){return[];} }
function saveLB(lb){ localStorage.setItem('wm_lb',JSON.stringify(lb)); }
function updateLB(name,sc){
  let lb=loadLB();
  const idx=lb.findIndex(r=>r.name===name);
  if(idx>=0){if(sc>lb[idx].score)lb[idx].score=sc;}else lb.push({name,score:sc});
  lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,20);saveLB(lb);return lb;
}
function renderLB(currentName){
  const lb=loadLB(),c=document.getElementById('lb-list');
  c.innerHTML='';
  if(!lb.length){c.innerHTML='<div style="color:#888;text-align:center;padding:12px">暂无记录</div>';return;}
  lb.forEach((r,i)=>{
    const row=document.createElement('div');
    row.className='lb-row'+(r.name===currentName?' me':'');
    const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    row.innerHTML=`<span class="lb-rank">${med}</span><span class="lb-name">${r.name.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span><span class="lb-score">${r.score.toLocaleString()}</span>`;
    c.appendChild(row);
  });
}

// ── AUDIO ────────────────────────────────────────────
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15){
  try{const c=getAC(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.setValueAtTime(freq,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*1.5,c.currentTime+dur*.6);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function playDrop(){playTone(180,0.1,'triangle',0.07);}
function playMerge(lv){playTone(300+lv*30,0.3,'sine',0.17);}

// ── PARTICLES ────────────────────────────────────────
const pCanvas=document.getElementById('particle-canvas');
const pCtx=pCanvas.getContext('2d');
let particles=[];
function spawnParticles(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.4,sp=2.5+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.022+Math.random()*.018,r:3+Math.random()*4,color});
  }
}
function updateParticles(){
  pCtx.clearRect(0,0,360,520);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;
    pCtx.globalAlpha=p.life;pCtx.fillStyle=p.color;
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);pCtx.fill();
  }
  pCtx.globalAlpha=1;
}

// ── IMAGES ───────────────────────────────────────────
const IMGS=new Array(32).fill(null);
let imgsReady=0;
function preloadImages(cb){
  LEVELS.forEach((_,i)=>{
    const img=new Image();
    img.onload=()=>{IMGS[i]=img;if(++imgsReady===32&&cb)cb();};
    img.onerror=()=>{if(++imgsReady===32&&cb)cb();};
    img.src=`images/lv${String(i+1).padStart(2,'0')}.png`;
  });
}

// ── DRAW ─────────────────────────────────────────────
function drawItem(ctx,x,y,ld,alpha=1){
  const{r,color,emoji,lv}=ld;
  ctx.save();ctx.globalAlpha=alpha;
  const img=IMGS[lv-1];
  if(img){
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
    ctx.drawImage(img,x-r,y-r,r*2,r*2);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.stroke();
  } else {
    const n=parseInt(color.slice(1),16)||0;
    const lighten=(n,a)=>`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xff)+a)},${Math.min(255,(n&0xff)+a)})`;
    const darken=(n,a)=>`rgb(${Math.max(0,(n>>16)-a)},${Math.max(0,((n>>8)&0xff)-a)},${Math.max(0,(n&0xff)-a)})`;
    const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,lighten(n,55));g.addColorStop(1,darken(n,25));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1.5;ctx.stroke();
    const fs=Math.max(10,Math.floor(r*.85));
    ctx.font=`${fs}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,x,y);
    if(r>35){
      ctx.font=`bold ${Math.max(7,Math.floor(r*.26))}px sans-serif`;
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillText(`Lv.${lv}`,x,y+r*.62);
    }
  }
  ctx.restore();
}

// ── LEVEL GUIDE ──────────────────────────────────────
(function(){
  const grid=document.getElementById('level-grid');
  LEVELS.forEach((lv,i)=>{
    const sz=Math.min(28,Math.max(12,lv.r*.2));
    const item=document.createElement('div');item.className='level-item';
    item.innerHTML=`<img src="images/lv${String(i+1).padStart(2,'0')}.png"
      style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;"
      onerror="this.outerHTML='<div class=level-dot style=width:${sz}px;height:${sz}px;background:${lv.color};font-size:${sz*.6}px>${lv.emoji}</div>'"
      title="${lv.name}">
    <div class="level-name">${lv.name.replace('竹君','').replace('宇宙','')}</div>`;
    grid.appendChild(item);
  });
})();

// ═══════════════════════════════════════════════════════
// GAME ENGINE
// Follows the same architecture as moonfloof/suika-game:
//   - State machine: READY | DROPPING | OVER
//   - Preview ball is a real Matter body (isStatic+isSensor)
//     moved by mouse, removed+re-created on drop
//   - Merge: mark popped, remove both together, spawn new
// ═══════════════════════════════════════════════════════
const GAME_W=360,GAME_H=520,WALL_T=30,DROP_Y=44;
const {Engine,Render,Runner,World,Bodies,Events,Body,Composite}=Matter;

const GameState={READY:0,DROPPING:1,OVER:2};

let gs=GameState.OVER;
let engine,world,runner;
let score=0,playerName='玩家';
let currentLvIdx=0,nextLvIdx=0;
let previewBody=null;   // the static+sensor ball shown at top before drop
let overflowTimer=null;
let dropCooldownId=null;
let animId=null;

const gameCanvas=document.getElementById('gameCanvas');
const gCtx=gameCanvas.getContext('2d');

function rndSpawnIdx(){ return Math.floor(Math.random()*(SPAWN_MAX_IDX+1)); }

// ── Create a physics body for a level ────────────────
function makeBody(lvIdx,x,y,opts={}){
  const lv=LEVELS[lvIdx];
  const b=Bodies.circle(x,y,lv.r,Object.assign({
    restitution:0.3,friction:0.5,frictionAir:0.005,
    label:'item',
    collisionFilter:{category:0x0001,mask:0xFFFF}
  },opts));
  b._lvIdx=lvIdx;
  b.popped=false;
  return b;
}

// ── Preview ball (static+sensor, moves with cursor) ──
function createPreview(x){
  if(previewBody){Composite.remove(world,previewBody);previewBody=null;}
  previewBody=makeBody(currentLvIdx,x,DROP_Y,{
    isStatic:true,
    isSensor:true,
    collisionFilter:{category:0x0002,mask:0x0000}  // no collisions at all
  });
  Composite.add(world,previewBody);
}
function movePreview(x){
  if(!previewBody)return;
  const lv=LEVELS[currentLvIdx];
  const cx=Math.max(lv.r+2,Math.min(GAME_W-lv.r-2,x));
  Body.setPosition(previewBody,{x:cx,y:DROP_Y});
}

// ── Drop ─────────────────────────────────────────────
function dropBall(x){
  if(gs!==GameState.READY)return;
  gs=GameState.DROPPING;
  playDrop();

  // Remove preview, spawn real ball at same x
  const lv=LEVELS[currentLvIdx];
  const cx=Math.max(lv.r+2,Math.min(GAME_W-lv.r-2,x));
  if(previewBody){Composite.remove(world,previewBody);previewBody=null;}
  const b=makeBody(currentLvIdx,cx,DROP_Y);
  Composite.add(world,b);

  // Advance to next
  currentLvIdx=nextLvIdx;
  nextLvIdx=rndSpawnIdx();
  updatePreview_ui();

  // After cooldown, spawn new preview and go READY
  if(dropCooldownId)clearTimeout(dropCooldownId);
  dropCooldownId=setTimeout(()=>{
    dropCooldownId=null;
    if(gs===GameState.DROPPING){
      createPreview(GAME_W/2);
      gs=GameState.READY;
    }
  },500);
}

// ── Collision / Merge ─────────────────────────────────
function handleCollision(e){
  for(const pair of e.pairs){
    const a=pair.bodyA,b=pair.bodyB;
    if(a.isStatic||b.isStatic||a.isSensor||b.isSensor)continue;
    if(a.popped||b.popped)continue;
    if(a._lvIdx===undefined||b._lvIdx===undefined)continue;
    if(a._lvIdx!==b._lvIdx)continue;
    const li=a._lvIdx;
    if(li>=LEVELS.length-1)continue;

    a.popped=true;b.popped=true;
    const mx=(a.position.x+b.position.x)/2;
    const my=(a.position.y+b.position.y)/2;

    // Remove both as array (atomic)
    Composite.remove(world,[a,b]);

    // Spawn merged ball
    const nb=makeBody(li+1,mx,my);
    Composite.add(world,nb);
    Body.setVelocity(nb,{x:0,y:-2});
    nb._flash=12;

    score+=Math.pow(li+2,2)*10;
    document.getElementById('score').textContent=score;
    playMerge(li+2);
    spawnParticles(mx,my,LEVELS[li+1].color,16);
  }
}

// ── Game Over ─────────────────────────────────────────
const GAMEOVER_LINE=DROP_Y+10;
function checkGameOver(){
  const bodies=Composite.allBodies(world);
  for(const b of bodies){
    if(b.isStatic||b.isSensor||b._lvIdx===undefined||b.popped)continue;
    if(b.position.y-LEVELS[b._lvIdx].r<GAMEOVER_LINE){
      if(!overflowTimer)overflowTimer=setTimeout(()=>{
        if(gs!==GameState.OVER)triggerGameOver();
      },2000);
      return;
    }
  }
  if(overflowTimer){clearTimeout(overflowTimer);overflowTimer=null;}
}
function triggerGameOver(){
  gs=GameState.OVER;
  if(dropCooldownId){clearTimeout(dropCooldownId);dropCooldownId=null;}
  if(previewBody){Composite.remove(world,previewBody);previewBody=null;}
  const lb=updateLB(playerName,score);
  const rank=lb.findIndex(r=>r.name===playerName)+1;
  document.getElementById('final-score').textContent=score.toLocaleString();
  const best=lb.find(r=>r.name===playerName)?.score||score;
  document.getElementById('gameover-msg').textContent=
    rank===1?'🥇 排行榜第一！太强了！':
    score===best?`🎉 新纪录！当前排名第${rank}名`:
    `当前排名第${rank}名，继续加油！💪`;
  document.getElementById('gameover-screen').classList.add('active');
}

// ── Preview UI ────────────────────────────────────────
function updatePreview_ui(){
  const cur=LEVELS[currentLvIdx],nxt=LEVELS[nextLvIdx];
  document.getElementById('current-name').textContent=cur.emoji+' '+cur.name;
  document.getElementById('next-name').textContent=nxt.emoji+' '+nxt.name;
  const nc=document.getElementById('next-canvas');
  const nx=nc.getContext('2d');
  nx.clearRect(0,0,44,44);
  nx.fillStyle='rgba(0,0,0,.3)';nx.beginPath();nx.arc(22,22,21,0,Math.PI*2);nx.fill();
  const sc2=Math.min(1,18/nxt.r);
  nx.save();nx.translate(22,22);nx.scale(sc2,sc2);nx.translate(-22,-22);
  drawItem(nx,22,22,nxt);nx.restore();
}

// ── Render loop ───────────────────────────────────────
function renderLoop(){
  Engine.update(engine,1000/60);
  if(gs!==GameState.OVER)checkGameOver();

  gCtx.clearRect(0,0,GAME_W,GAME_H);
  const bg=gCtx.createLinearGradient(0,0,0,GAME_H);
  bg.addColorStop(0,'#0d0020');bg.addColorStop(1,'#1a0030');
  gCtx.fillStyle=bg;gCtx.fillRect(0,0,GAME_W,GAME_H);

  // Danger line
  gCtx.strokeStyle='rgba(255,60,60,.25)';gCtx.lineWidth=1;gCtx.setLineDash([6,6]);
  gCtx.beginPath();gCtx.moveTo(0,GAMEOVER_LINE+LEVELS[currentLvIdx].r);gCtx.lineTo(GAME_W,GAMEOVER_LINE+LEVELS[currentLvIdx].r);
  gCtx.stroke();gCtx.setLineDash([]);

  // Draw all non-static, non-sensor bodies
  const bodies=Composite.allBodies(world);
  for(const b of bodies){
    if(b.isStatic||b.isSensor||b._lvIdx===undefined||b.popped)continue;
    const ld=LEVELS[b._lvIdx];
    gCtx.save();
    gCtx.translate(b.position.x,b.position.y);
    gCtx.rotate(b.angle);
    gCtx.translate(-b.position.x,-b.position.y);
    drawItem(gCtx,b.position.x,b.position.y,ld);
    if(b._flash>0){
      gCtx.globalAlpha=b._flash/12*.5;
      gCtx.fillStyle='#fff';gCtx.beginPath();gCtx.arc(b.position.x,b.position.y,ld.r,0,Math.PI*2);gCtx.fill();
      b._flash--;
    }
    gCtx.restore();
  }
  // Draw preview ball (semi-transparent)
  if(gs===GameState.READY&&previewBody){
    drawItem(gCtx,previewBody.position.x,previewBody.position.y,LEVELS[currentLvIdx],0.5);
  }

  // Wall glow
  gCtx.strokeStyle='rgba(180,80,255,.2)';gCtx.lineWidth=3;
  gCtx.strokeRect(1.5,1.5,GAME_W-3,GAME_H-3);

  updateParticles();
  if(gs!==GameState.OVER||particles.length>0)animId=requestAnimationFrame(renderLoop);
}

// ── Init ─────────────────────────────────────────────
function initGame(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  if(dropCooldownId){clearTimeout(dropCooldownId);dropCooldownId=null;}
  if(overflowTimer){clearTimeout(overflowTimer);overflowTimer=null;}
  if(engine){
    Events.off(engine);
    Composite.clear(engine.world,false);
    Engine.clear(engine);
  }
  particles=[];previewBody=null;
  score=0;gs=GameState.READY;
  document.getElementById('score').textContent='0';

  currentLvIdx=rndSpawnIdx();nextLvIdx=rndSpawnIdx();
  updatePreview_ui();

  engine=Engine.create({gravity:{y:1.5}});
  world=engine.world;

  const wallOpts={isStatic:true,friction:.6,restitution:.2,label:'wall'};
  Composite.add(world,[
    Bodies.rectangle(GAME_W/2, GAME_H+WALL_T/2, GAME_W+WALL_T*2, WALL_T, wallOpts),
    Bodies.rectangle(-WALL_T/2, GAME_H/2, WALL_T, GAME_H*3, wallOpts),
    Bodies.rectangle(GAME_W+WALL_T/2, GAME_H/2, WALL_T, GAME_H*3, wallOpts),
  ]);

  Events.on(engine,'collisionStart',handleCollision);

  // Create first preview ball
  createPreview(GAME_W/2);
  updateGuide(GAME_W/2);

  renderLoop();
}

// ── Input ─────────────────────────────────────────────
function getGameX(clientX){
  const rect=gameCanvas.getBoundingClientRect();
  const raw=(clientX-rect.left)*(GAME_W/rect.width);
  const lv=LEVELS[currentLvIdx];
  return Math.max(lv.r+2,Math.min(GAME_W-lv.r-2,raw));
}
function updateGuide(x){
  const l=document.getElementById('guide-line');
  l.setAttribute('x1',x);l.setAttribute('x2',x);
}

gameCanvas.addEventListener('mousemove',e=>{
  if(gs!==GameState.READY)return;
  const x=getGameX(e.clientX);
  movePreview(x);updateGuide(x);
});
gameCanvas.addEventListener('click',e=>{
  if(gs!==GameState.READY)return;
  dropBall(getGameX(e.clientX));
});
gameCanvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gs!==GameState.READY)return;
  const x=getGameX(e.touches[0].clientX);
  movePreview(x);updateGuide(x);
},{passive:false});
gameCanvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(gs!==GameState.READY)return;
  const x=getGameX(e.touches[0].clientX);
  movePreview(x);updateGuide(x);
},{passive:false});
gameCanvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(gs!==GameState.READY)return;
  dropBall(getGameX(e.changedTouches[0].clientX));
},{passive:false});

// ── Buttons ───────────────────────────────────────────
preloadImages(()=>console.log('images ready'));

document.getElementById('start-btn').addEventListener('click',()=>{
  const raw=document.getElementById('name-input').value.trim();
  playerName=raw||'匿名玩家';
  document.getElementById('start-screen').classList.remove('active');
  initGame();
});
document.getElementById('name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('start-btn').click();
});
document.getElementById('restart-btn').addEventListener('click',()=>{
  document.getElementById('gameover-screen').classList.remove('active');
  initGame();
});
document.getElementById('leaderboard-btn').addEventListener('click',()=>{
  renderLB(playerName);document.getElementById('lb-overlay').classList.add('active');
});
document.getElementById('lb-close').addEventListener('click',()=>{
  document.getElementById('lb-overlay').classList.remove('active');
});
</script>
